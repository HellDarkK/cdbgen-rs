# cdbgen-rs example configuration.
#
# Install path:
#   /etc/cdbgen/config.toml
#
# Output directory:
#   /var/lib/cdbgen
#
# Source IDs must match: ^[a-zA-Z0-9_-]+$
#
# Source format is autodetected:
#   hostfile - hosts/plain-domain list. field=0 auto behavior accepts
#              domain IP, IP domain, and bare domains.
#   adblock  - Adblock/uBO-style exact-domain rules, with @@ exceptions.
#   unbound  - Unbound local-zone/local-data format.
#   rpz      - RPZ CNAME . format.

[sources]

# Hosts/plain-domain source.
hosts_example = "https://example.com/blocklists/hosts.txt"

# Adblock/uBO-style exact-domain rules.
adblock_example = "https://example.com/blocklists/filter.txt"

# Unbound local-zone/local-data source.
unbound_example = "https://example.com/blocklists/unbound.conf"

# RPZ CNAME . source.
rpz_example = "https://example.com/blocklists/rpz.txt"

[outputs]

# Single output path.
"hosts_example, adblock_example" = "/var/lib/cdbgen/default.cdb"

# Multiple output paths for the same source group.
"hosts_example, unbound_example, rpz_example" = [
    "/var/lib/cdbgen/combined.cdb",
    "/srv/www/blocklists/combined.cdb",
]
