name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Prepare release artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="cdbgen-rs-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
          cp target/x86_64-unknown-linux-musl/release/cdbgen-rs "dist/${asset}"
          chmod 0755 "dist/${asset}"
          sha256sum "dist/${asset}" > "dist/${asset}.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "cdbgen-rs ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
